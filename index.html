<!doctype html>
<html lang="en" data-theme="themed">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>aar-deploy — Loadmaster Station</title>
  <meta name="description" content="aar-deploy: a fully offline newborn-care tracker themed as a military-aircraft loadmaster console. All data stays on your device." />

  <!-- ADR-006 cache hint. Pages still applies its 10-minute cache; the
       boot SCHEMA_VERSION check is the durable mitigation. -->
  <meta http-equiv="Cache-Control" content="no-cache" />

  <!-- Content-Security-Policy per ADR-012 (post-Phase-4 §5.3 fix:
       connect-src 'self' for the boot-time locale fetch). -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none';
                 script-src 'self' 'sha256-IHeNPfCHzCvtX6OsaEdIfL37hqJtjKx4DS4aBxV0Rk4=';
                 style-src 'self';
                 connect-src 'self';
                 img-src 'self' data:;
                 base-uri 'none';
                 form-action 'none';
                 manifest-src 'none'" />

  <link rel="stylesheet" href="css/main.css?v=1" />
  <link rel="stylesheet" href="css/motion.css?v=1" />
  <link rel="stylesheet" href="css/contrast.css?v=1" />
  <link rel="stylesheet" href="css/print.css?v=1" media="print" />

  <!-- C-01 head-inline boot loader: pre-paint resolves theme + lang from
       URL > localStorage > navigator. NFR-12 (dark-by-default) is set
       here so there is no FOUC even before js/app.js evaluates. -->
  <script>
    (function () {
      try {
        var p = new URL(location).searchParams;
        var lang = p.get('lang') || localStorage.getItem('aar.lang') ||
                   (navigator.language || 'en').split('-')[0] || 'en';
        var supported = ['en', 'pt-br', 'fr', 'el'];
        if (supported.indexOf(lang) < 0) lang = 'en';
        document.documentElement.lang = lang;
        // Theme: URL > localStorage (mirror of appState.themePreference) > themed.
        var t = p.get('theme');
        if (t !== 'themed' && t !== 'plain') {
          try {
            var raw = localStorage.getItem('aar.appState');
            if (raw) {
              var s = JSON.parse(raw);
              if (s && (s.themePreference === 'plain' || s.themePreference === 'themed')) t = s.themePreference;
            }
          } catch (e) { /* swallow */ }
        }
        document.documentElement.setAttribute('data-theme', (t === 'plain') ? 'plain' : 'themed');
      } catch (e) { /* boot recovery in app.js will handle it */ }
    })();
  </script>
</head>
<body>
  <main id="app" role="main"></main>

  <!-- Vendored lz-string (ADR-013) — classic script so window.LZString is
       defined before js/app.js evaluates. -->
  <script src="js/vendor/lz-string-1.4.4.min.js?v=1"></script>
  <script type="module" src="js/app.js?v=1"></script>
</body>
</html>
